<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Scientists</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🔬 Hidden Scientists</h1>
    <p>마틸다 효과로 가려진 과학자들을 만나보세요.</p>
</header>

<main>

    <section class="intro">

        <h2>마틸다 효과(Matilda Effect)</h2>

        <p>
            마틸다 효과는 여성 과학자의 연구 성과가
            남성 동료에게 돌아가거나
            제대로 인정받지 못하는 현상을 의미합니다.
        </p>

        <button id="randomBtn">
            🎲 랜덤 과학자 보기
        </button>

    </section>

    <section id="scientistCard" class="card">

        <img
        id="photo"
        src="https://via.placeholder.com/300x350?text=Scientist"
        alt="scientist">

        <h2 id="name">
            버튼을 눌러 과학자를 만나보세요!
        </h2>

        <h3 id="field"></h3>

        <p id="country"></p>

        <div class="info">

            <h3>🏆 대표 업적</h3>

            <p id="achievement"></p>

        </div>

        <div class="info">

            <h3>❓ 왜 잘 알려지지 않았을까?</h3>

            <p id="reason"></p>

        </div>

        <div class="info">

            <h3>💡 재미있는 사실</h3>

            <p id="fact"></p>

        </div>

    </section>

</main>

<footer>

    <p>
        Hidden Scientists © 2026
    </p>

</footer>

<script src="script.js"></script>

</body>
</html>
